##############################################################
# Render.com Blueprint — SN Machinery Full-Stack App
# Docs: https://render.com/docs/blueprint-spec
##############################################################

services:
  - type: web
    name: sn-machinery
    runtime: node
    # Build: install & compile both client and server
    buildCommand: >
      cd client && npm install && npm run build &&
      cd ../server && npm install && npm run build &&
      npx prisma migrate deploy
    startCommand: node server/dist/index.js
    # The server listens on the PORT env var Render automatically injects
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: sn-machinery-db
          property: connectionString
      # Auto-generated strong secret — Render rotates it only on re-deploy
      - key: JWT_SECRET
        generateValue: true
      # Set this to your Render service URL once deployed, e.g.:
      # https://sn-machinery.onrender.com
      - key: FRONTEND_URL
        sync: false
      # Email — fill in the Render dashboard (Environment > Secret Files)
      - key: EMAIL_SERVICE
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
    # Persistent disk for machine images (paid Render plans only).
    # Remove this section if you are on the free plan and handle
    # file storage via a cloud bucket (e.g. Cloudinary / S3) instead.
    disk:
      name: uploads
      mountPath: /opt/render/project/src/server/uploads
      sizeGB: 1

databases:
  - name: sn-machinery-db
    databaseName: sn_machinery
    user: sn_machinery_user
    plan: free
